<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search Person - AI Platform</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; min-height: 100vh;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f2ff 40%, #d4f1f4 100%);
            color: #2d3748; overflow-x: hidden;
        }
        .bg-elements { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .float-circle {
            position: absolute; border-radius: 50%; 
            background: radial-gradient(circle, rgba(99, 179, 255, 0.15), transparent);
            animation: floatGentle 20s infinite ease-in-out;
        }
        .float-circle:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 10%; animation-delay: 0s; }
        .float-circle:nth-child(2) { width: 150px; height: 150px; top: 60%; right: 15%; background: radial-gradient(circle, rgba(72, 187, 120, 0.12), transparent); animation-delay: 5s; }
        .float-circle:nth-child(3) { width: 100px; height: 100px; bottom: 20%; left: 20%; background: radial-gradient(circle, rgba(147, 51, 234, 0.1), transparent); animation-delay: 10s; }
        @keyframes floatGentle { 0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.6; } 33% { transform: translateY(-20px) rotate(120deg); opacity: 0.8; } 66% { transform: translateY(-10px) rotate(240deg); opacity: 0.7; } }
        .container { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem 4rem; display: flex; flex-direction: column; gap: 2.5rem; text-align: center; }
        .header h1 { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 700; background: linear-gradient(135deg, #4c51bf 0%, #63b3ed 50%, #48bb78 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .header p { font-size: 1.2rem; color: #4a5568; max-width: 600px; margin: 0 auto; }
        .section { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-radius: 24px; padding: 3rem; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255, 255, 255, 0.3); transition: all 0.4s ease; }
        .section:hover { transform: translateY(-8px); box-shadow: 0 30px 80px rgba(0, 0, 0, 0.12); }
        .section h2 { font-size: 1.8rem; font-weight: 600; color: #2d3748; margin-bottom: 2rem; }
        .text-search { display: flex; gap: 1.2rem; justify-content: center; align-items: center; flex-wrap: wrap; margin: 2rem 0; }
        #searchInput { 
            padding: 20px 28px; font-size: 1.15rem; border: 2px solid rgba(99, 179, 255, 0.4); 
            border-radius: 20px; background: rgba(255,255,255,0.9); color: #2d3748; 
            width: 420px; max-width: 100%; box-shadow: inset 0 4px 12px rgba(0,0,0,0.05); 
            transition: all 0.3s; font-family: inherit;
        }
        #searchInput:focus { outline: none; border-color: #63b3ed; box-shadow: 0 0 0 4px rgba(99, 179, 255, 0.2); transform: scale(1.02); }
        #searchInput::placeholder { color: #718096; }
        button { 
            padding: 20px 40px; font-size: 1.15rem; font-weight: 600; color: white; 
            background: linear-gradient(135deg, #4c51bf 0%, #63b3ed 100%); border: none; 
            border-radius: 20px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 12px 35px rgba(76, 81, 191, 0.3); font-family: inherit;
        }
        button:hover:not(:disabled) { transform: translateY(-5px); box-shadow: 0 25px 50px rgba(76, 81, 191, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        #searchResult { 
            min-height: 150px; padding: 2.5rem; background: rgba(255,255,255,0.85); 
            border-radius: 20px; border: 2px solid rgba(99,179,255,0.4); font-size: 1.2rem; 
            margin-top: 1.5rem; text-align: center; transition: all 0.4s; line-height: 1.6;
        }
        #searchResult.found { border-color: #48bb78; background: rgba(72,187,120,0.15); }
        #searchResult.not-found { border-color: #e53e3e; background: rgba(229,62,62,0.12); color: #742a2a; }
        .loading { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; border-top-color: #fff; animation: spin 1s infinite; margin-right: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-btn { text-align: center; margin-top: 3rem; }
        @media (max-width: 768px) { 
            .container { padding: 1.5rem; } 
            .text-search { flex-direction: column; gap: 1rem; } 
            #searchInput { width: 100%; } 
            button { width: 100%; max-width: 350px; } 
        }
    </style>
</head>
<body>
    <div class="bg-elements">
        <div class="float-circle"></div><div class="float-circle"></div><div class="float-circle"></div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>🔍 Search Person</h1>
            <p>Find registered individuals by ID, Email or Mobile Number</p>
        </div>

        <!-- Text Search ONLY -->
        <div class="section">
            <h2>Database Search</h2>
        
            <div class="text-search">
                <input type="text" id="searchInput" placeholder="Enter ID, Email or Mobile...">
                <button id="searchBtn">🔍 Search Database</button>
            </div>
        </div>

        <!-- Results -->
        <div class="section">
            <h2>Search Results</h2>
            <div id="searchResult">Enter ID, email or mobile number above to search..</div>
        </div>

        <div class="back-btn">
            <a href="/" style="text-decoration: none;">
                <button>← Back to Dashboard</button>
            </a>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResult = document.getElementById('searchResult');

        // TEXT SEARCH - Perfectly connected to your database ✅
        function performSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                searchResult.className = 'not-found';
                searchResult.innerHTML = '❌ Please enter ID, email, or mobile number';
                return;
            }

            searchResult.className = '';
            searchResult.innerHTML = '<div class="loading"></div>🔍 Searching database...';

            fetch('/search-person', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query})
            })
            .then(response => response.json())
            .then(data => {
                if (data.found) {
                    searchResult.className = 'found';
                    searchResult.innerHTML = `
                        <div style="text-align: left; max-width: 500px; margin: 0 auto;">
                            <h3 style="color: #28a745; margin-bottom: 1.5rem; font-size: 1.5rem;">✅ PERSON FOUND!</h3>
                            <div style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(72,187,120,0.2); margin-bottom: 1rem;">
                                <p><strong style="color: #2d3748;">ID:</strong> <span style="color: #48bb78;">${data.id}</span></p>
                                <p><strong style="color: #2d3748;">Name:</strong> ${data.person.name}</p>
                                <p><strong style="color: #2d3748;">Age:</strong> ${data.person.age}</p>
                                <p><strong style="color: #2d3748;">Email:</strong> ${data.person.email}</p>
                                <p><strong style="color: #2d3748;">Mobile:</strong> ${data.person.mobile}</p>
                            </div>
                            ${data.image ? `
                                <div style="margin-top: 1.5rem;">
                                    <img src="${data.image}" style="width: 180px; height: auto; border-radius: 16px; border: 4px solid #48bb78; box-shadow: 0 8px 30px rgba(72,187,120,0.3);" alt="Profile Photo">
                                </div>
                            ` : ''}
                        </div>
                    `;
                } else {
                    searchResult.className = 'not-found';
                    searchResult.innerHTML = `
                        <h3 style="font-size: 1.4rem;">❌ No person found matching "${query}"</h3>
                        <p style="margin-top: 1rem; opacity: 0.8;">Try: with valid ID, mail, mobile no, etc.</p>
                    `;
                }
            })
            .catch(err => {
                searchResult.className = 'not-found';
                searchResult.innerHTML = '❌ Search failed. Please try again.';
                console.error(err);
            });
        }

        // Event listeners
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') performSearch();
        });

        // Focus on input
        searchInput.focus();
    </script>
</body>
</html>
